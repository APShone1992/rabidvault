<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Rabid Vault</title>
    <style>
      body { background: #0d0d12; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
    <script>
      // This fixes GitHub Pages not supporting React Router.
      // When someone refreshes a page or visits a direct link,
      // GitHub returns a 404. This page captures where they were
      // trying to go and sends them to the right place.
      sessionStorage.setItem('gh-pages-redirect', window.location.href)
      window.location.replace(window.location.origin + '/rabidvault/')
    </script>
  </head>
  <body>
    <div style="color:#8b5cf6;font-family:sans-serif;text-align:center">
      <div style="font-size:3rem;margin-bottom:1rem">🦝</div>
      <div>Loading The Rabid Vault...</div>
    </div>
  </body>
</html>
