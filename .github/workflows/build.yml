name: Build The Rabid Vault

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        env:
          VITE_SUPABASE_URL:           ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:      ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_COMICVINE_API_KEY:      ${{ secrets.VITE_COMICVINE_API_KEY }}
          VITE_GOOGLE_VISION_API_KEY:  ${{ secrets.VITE_GOOGLE_VISION_API_KEY }}
        run: npm run build

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 30

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

  deploy-functions:
    needs: build-web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy edge functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_ID:   ${{ secrets.SUPABASE_PROJECT_ID }}
        run: |
          supabase link --project-ref $SUPABASE_PROJECT_ID
          supabase functions deploy comicvine-proxy
          supabase functions deploy vision-proxy
          supabase functions deploy price-alerts
          supabase functions deploy cgc-verify
          supabase functions deploy weekly-snapshot
          supabase secrets set GOOGLE_VISION_API_KEY=${{ secrets.GOOGLE_VISION_API_KEY }}
          supabase secrets set COMICVINE_API_KEY=${{ secrets.VITE_COMICVINE_API_KEY }}

  build-android:
    needs: build-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build web app for Capacitor
        env:
          VITE_SUPABASE_URL:           ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY:      ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_COMICVINE_API_KEY:      ${{ secrets.VITE_COMICVINE_API_KEY }}
          VITE_GOOGLE_VISION_API_KEY:  ${{ secrets.VITE_GOOGLE_VISION_API_KEY }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make Gradle executable
        run: |
          chmod +x android/gradlew
          git config core.fileMode false

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: The Rabid Vault-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  release:
    needs: [build-web, build-android]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Android APK
        uses: actions/download-artifact@v4
        with:
          name: The Rabid Vault-Android
          path: ./release-files

      - name: Rename APK
        run: mv ./release-files/app-debug.apk "./release-files/TheRabidVault.apk"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: The Rabid Vault v${{ github.run_number }}
          body: |
            ## 🦝 The Rabid Vault — Latest Build

            ### 📱 Android App
            Download **TheRabidVault.apk** below and install on your Android phone.

            ### 🌐 Web App
            - **Web app:** https://${{ github.repository_owner }}.github.io/rabidvault
            - **Download page:** https://${{ github.repository_owner }}.github.io/rabidvault/download.html
          files: ./release-files/TheRabidVault.apk
          draft: false
          prerelease: false
