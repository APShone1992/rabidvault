<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#2d1060"/>
      <stop offset="100%" stop-color="#09090f"/>
    </radialGradient>
    <radialGradient id="purple-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="book-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="page-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0e8ff"/>
      <stop offset="100%" stop-color="#ddd0f8"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg-glow)"/>

  <!-- Subtle border -->
  <rect width="512" height="512" rx="100" fill="none" stroke="#8b5cf6" stroke-width="6" stroke-opacity="0.4"/>

  <!-- Purple glow behind raccoon -->
  <ellipse cx="256" cy="260" rx="200" ry="190" fill="url(#purple-glow)"/>

  <!-- ── RACCOON BODY ── -->
  <!-- Body -->
  <ellipse cx="256" cy="340" rx="90" ry="75" fill="#4a4452"/>
  <!-- Belly -->
  <ellipse cx="256" cy="348" rx="55" ry="50" fill="#c8b8d8"/>

  <!-- ── RACCOON HEAD ── -->
  <ellipse cx="256" cy="230" rx="88" ry="82" fill="#4a4452"/>

  <!-- Ears -->
  <ellipse cx="186" cy="165" rx="28" ry="32" fill="#4a4452"/>
  <ellipse cx="186" cy="165" rx="16" ry="20" fill="#2a2030"/>
  <ellipse cx="326" cy="165" rx="28" ry="32" fill="#4a4452"/>
  <ellipse cx="326" cy="165" rx="16" ry="20" fill="#2a2030"/>

  <!-- Face mask (lighter grey around eyes) -->
  <ellipse cx="232" cy="228" rx="28" ry="24" fill="#c8b8d8"/>
  <ellipse cx="280" cy="228" rx="28" ry="24" fill="#c8b8d8"/>

  <!-- Dark eye mask patches -->
  <ellipse cx="232" cy="226" rx="22" ry="18" fill="#1a1424"/>
  <ellipse cx="280" cy="226" rx="22" ry="18" fill="#1a1424"/>

  <!-- Eyes - looking down at book -->
  <ellipse cx="232" cy="228" rx="11" ry="10" fill="#fff"/>
  <ellipse cx="280" cy="228" rx="11" ry="10" fill="#fff"/>
  <!-- Pupils angled down -->
  <ellipse cx="234" cy="231" rx="7" ry="7" fill="#1a1424"/>
  <ellipse cx="282" cy="231" rx="7" ry="7" fill="#1a1424"/>
  <!-- Eye shine -->
  <circle cx="237" cy="228" r="2.5" fill="#fff"/>
  <circle cx="285" cy="228" r="2.5" fill="#fff"/>

  <!-- Nose -->
  <ellipse cx="256" cy="252" rx="12" ry="8" fill="#2a2030"/>
  <ellipse cx="256" cy="250" rx="7" ry="5" fill="#4a3060"/>

  <!-- Nose shine -->
  <ellipse cx="253" cy="248" rx="3" ry="2" fill="#6a5080" fill-opacity="0.7"/>

  <!-- Cheek stripes -->
  <path d="M195 240 Q182 248 175 258" stroke="#3a3040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M200 248 Q186 253 180 263" stroke="#3a3040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M317 240 Q330 248 337 258" stroke="#3a3040" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M312 248 Q326 253 332 263" stroke="#3a3040" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Raccoon tail -->
  <path d="M345 370 Q400 350 410 380 Q420 410 380 420 Q350 425 340 400 Z" fill="#4a4452"/>
  <path d="M355 375 Q395 360 402 385 Q408 405 378 412 Q355 416 348 398 Z" fill="#c8b8d8"/>
  <!-- Tail stripes -->
  <path d="M365 378 Q385 370 392 382" stroke="#3a3040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M362 388 Q382 382 388 394" stroke="#3a3040" stroke-width="5" fill="none" stroke-linecap="round"/>
  <path d="M360 398 Q378 394 382 406" stroke="#3a3040" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Arms holding book -->
  <path d="M175 320 Q155 345 158 375 Q162 390 180 385" fill="#4a4452" stroke="#4a4452" stroke-width="2"/>
  <path d="M337 320 Q357 345 354 375 Q350 390 332 385" fill="#4a4452" stroke="#4a4452" stroke-width="2"/>

  <!-- ── COMIC BOOK ── -->
  <!-- Book shadow -->
  <rect x="173" y="362" width="166" height="118" rx="6" fill="#1a1020" fill-opacity="0.5"/>

  <!-- Book back cover -->
  <rect x="178" y="355" width="162" height="118" rx="6" fill="#5b21b6"/>

  <!-- Book spine -->
  <rect x="178" y="355" width="12" height="118" rx="3" fill="#4c1d95"/>

  <!-- Book front cover -->
  <rect x="184" y="350" width="156" height="118" rx="6" fill="url(#book-grad)"/>

  <!-- Book cover glow edge -->
  <rect x="184" y="350" width="156" height="118" rx="6" fill="none" stroke="#a78bfa" stroke-width="2" stroke-opacity="0.5"/>

  <!-- Book page edges -->
  <rect x="188" y="354" width="148" height="110" rx="4" fill="url(#page-grad)" fill-opacity="0.12"/>

  <!-- Comic cover art - simple burst lines -->
  <g opacity="0.9">
    <line x1="262" y1="410" x2="262" y2="360" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="262" y1="410" x2="310" y2="370" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="262" y1="410" x2="325" y2="410" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="262" y1="410" x2="310" y2="450" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="262" y1="410" x2="262" y2="462" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="262" y1="410" x2="214" y2="450" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="262" y1="410" x2="199" y2="410" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
    <line x1="262" y1="410" x2="214" y2="370" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.4"/>
  </g>

  <!-- Comic title text on cover -->
  <rect x="196" y="358" width="136" height="14" rx="3" fill="#f59e0b" fill-opacity="0.9"/>
  <text x="264" y="369" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="9" font-weight="900" fill="#1a0a00" letter-spacing="1">RABID VAULT</text>

  <!-- Comic issue number badge -->
  <circle cx="326" cy="362" r="14" fill="#f59e0b"/>
  <text x="326" y="366" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="900" fill="#1a0a00">#1</text>

  <!-- Stars on cover -->
  <text x="220" y="430" font-size="18" fill="#f59e0b" opacity="0.85">★</text>
  <text x="290" y="455" font-size="14" fill="#a78bfa" opacity="0.85">★</text>
  <text x="310" y="435" font-size="10" fill="#f59e0b" opacity="0.7">★</text>

  <!-- Purple sparkle dots around logo -->
  <circle cx="140" cy="180" r="4" fill="#8b5cf6" fill-opacity="0.6"/>
  <circle cx="372" cy="175" r="3" fill="#a78bfa" fill-opacity="0.5"/>
  <circle cx="130" cy="320" r="2.5" fill="#8b5cf6" fill-opacity="0.4"/>
  <circle cx="382" cy="310" r="3.5" fill="#8b5cf6" fill-opacity="0.5"/>
  <circle cx="160" cy="430" r="2" fill="#a78bfa" fill-opacity="0.4"/>
  <circle cx="360" cy="150" r="2" fill="#f59e0b" fill-opacity="0.5"/>
</svg>
